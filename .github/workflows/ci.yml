name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Annule les runs précédents encore en cours sur la même branche/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint · Build · Test · Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Installation fidèle au lockfile (échoue si package-lock désynchronisé)
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Échoue si une dépendance de PRODUCTION a une faille haute/critique.
      # Les deps de dev (serveur Vite/esbuild) ne sont pas dans le périmètre prod.
      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high

  secrets:
    name: Détection de secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks liste les commits de la PR via l'API
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historique complet pour scanner les commits

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
